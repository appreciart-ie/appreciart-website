<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Artist profile — Appreciart IE">
  <title id="page-title">Artist — Appreciart IE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>

    /* LOADING */
    .artist-loading {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--sec-grey);
    }

    /* HERO */
    .artist-hero {
      padding: calc(var(--sv) + 80px) var(--px) var(--sv);
      max-width: var(--max);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: clamp(48px, 7vw, 120px);
      align-items: start;
    }

    /* LEFT — profile card */
    .artist-profile-card {
      position: sticky;
      top: 100px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .artist-profile-img-wrap {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--light);
    }

    .artist-profile-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: grayscale(15%);
      transition: filter 0.4s;
    }

    .artist-profile-img-wrap:hover .artist-profile-img { filter: grayscale(0%); }

    .artist-profile-caption {
      background: var(--black);
      color: var(--white);
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .artist-profile-caption-type {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--sec-grey);
    }

    .artist-profile-caption-location {
      font-size: 11px;
      font-weight: 300;
      color: rgba(255,255,255,0.5);
    }

    /* RIGHT — info */
    .artist-info { padding-top: 8px; }

    .artist-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 16px;
      display: block;
    }

    .artist-name {
      font-size: clamp(48px, 8vw, 100px);
      font-weight: 900;
      text-transform: uppercase;
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: var(--black);
      margin-bottom: 24px;
    }

    .artist-styles {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px;
    }

    .artist-style-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--mid);
      border: 1px solid var(--light);
      padding: 6px 14px;
    }

    .artist-bio {
      font-size: 15px;
      font-weight: 300;
      color: var(--mid);
      line-height: 1.85;
      max-width: 540px;
      margin-bottom: 40px;
    }

    .artist-bio strong { color: var(--black); font-weight: 700; }

    .artist-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .artist-insta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 400;
      color: var(--mid);
      transition: color 0.2s;
      text-decoration: none;
    }

    .artist-insta:hover { color: var(--black); }
    .artist-insta svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* DIVIDER */
    .artist-divider {
      max-width: var(--max);
      margin: 0 auto var(--sv);
      padding: 0 var(--px);
    }

    .artist-divider hr {
      border: none;
      border-top: 1px solid var(--light);
    }

    /* PORTFOLIO */
    .artist-portfolio {
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 var(--px) var(--sv);
    }

    .artist-section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .artist-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--mid);
    }

    .artist-section-count {
      font-size: 11px;
      font-weight: 300;
      color: var(--sec-grey);
    }

    /* Masonry grid */
    .portfolio-grid {
      columns: 4;
      column-gap: 4px;
    }

    .portfolio-item {
      break-inside: avoid;
      margin-bottom: 4px;
      overflow: hidden;
      display: block;
      cursor: zoom-in;
      position: relative;
    }

    .portfolio-item img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .portfolio-item::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0);
      transition: background 0.4s ease;
      pointer-events: none;
    }

    .portfolio-item:hover::after {
      background: rgba(0, 0, 0, 0.28);
    }

    .portfolio-item:hover img {
      transform: scale(1.05);
    }

    .portfolio-item-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      z-index: 1;
    }

    .portfolio-item-icon svg {
      width: 28px;
      height: 28px;
      stroke: rgba(255,255,255,0.9);
    }

    .portfolio-item:hover .portfolio-item-icon {
      opacity: 1;
    }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      display: block;
    }

    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 24px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.6);
      font-size: 24px;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .lightbox-close:hover { color: var(--white); }

    /* AVAILABILITY */
    .artist-availability {
      background: var(--off-white);
      padding: var(--sv) var(--px);
    }

    .artist-availability-inner {
      max-width: var(--max);
      margin: 0 auto;
    }

    .availability-empty {
      font-size: 14px;
      font-weight: 300;
      color: var(--sec-grey);
      margin-top: 20px;
    }

    .availability-dates {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 24px;
    }

    .availability-date {
      padding: 10px 20px;
      border: 1px solid var(--light);
      background: var(--white);
      font-size: 12px;
      font-weight: 400;
      color: var(--black);
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      text-decoration: none;
    }

    .availability-date:hover {
      background: var(--black);
      color: var(--white);
      border-color: var(--black);
    }

    /* CTA */
    .artist-cta {
      background: var(--black);
      color: var(--white);
      padding: var(--sv) var(--px);
      text-align: center;
    }

    .artist-cta .section-title { color: var(--white); margin-bottom: 12px; }
    .artist-cta .section-body  { color: rgba(255,255,255,0.5); margin: 0 auto 36px; }
    .artist-cta .section-label { color: var(--sec-grey); }

    .artist-cta .btn-primary {
      background: var(--white);
      color: var(--black);
      border-color: var(--white);
    }

    .artist-cta .btn-primary:hover {
      background: transparent;
      color: var(--white);
    }

    /* NOT FOUND */
    .artist-not-found {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: var(--px);
    }

    .artist-not-found h1 {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 900;
      text-transform: uppercase;
    }

    .artist-not-found p {
      font-size: 15px;
      font-weight: 300;
      color: var(--mid);
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .artist-hero { grid-template-columns: 280px 1fr; }
      .portfolio-grid { columns: 3; }
    }

    @media (max-width: 768px) {
      .artist-hero {
        grid-template-columns: 1fr;
        gap: 32px;
      }

      .artist-profile-card { position: static; }
      .artist-profile-img  { aspect-ratio: 3/4; object-position: center 20%; }
      .portfolio-grid      { columns: 2; }
    }

    @media (max-width: 480px) {
      .portfolio-grid { columns: 2; column-gap: 3px; }
      .portfolio-item { margin-bottom: 3px; }
    }

  </style>
</head>
<body>

  <div id="site-header"></div>

  <div id="artist-root">
    <div class="artist-loading">Loading...</div>
  </div>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <div id="site-footer"></div>

  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/main.js"></script>
  <script>
  (function () {
    const INTERNAL = 'https://appreciart-internal-production-ee3c.up.railway.app';

    const slug = new URLSearchParams(window.location.search).get('slug');
    const root = document.getElementById('artist-root');

    if (!slug) {
      renderNotFound();
      return;
    }

    // Load artist data (includes profile_url + portfolio from backend) + availability in parallel
    Promise.all([
      fetchArtist(slug),
      fetchAvailability(slug),
    ]).then(([artist, availability]) => {
      if (!artist) { renderNotFound(); return; }
      renderArtist(artist, availability);
    }).catch(() => renderNotFound());

    async function fetchArtist(slug) {
      try {
        const res  = await fetch(`${INTERNAL}/api/public/artists/${slug}`, { signal: AbortSignal.timeout(12000) });
        if (!res.ok) return null;
        const data = await res.json();
        return data.artist || null;
      } catch { return null; }
    }

    async function fetchAvailability(slug) {
      try {
        const res  = await fetch(`${INTERNAL}/api/public/availability/${slug}`, { signal: AbortSignal.timeout(10000) });
        if (!res.ok) return [];
        const data = await res.json();
        return data.availability || [];
      } catch { return []; }
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-IE', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    function renderArtist(artist, availability) {
      // Update page title
      document.getElementById('page-title').textContent = `${artist.name} — Appreciart IE`;

      const portfolio     = artist.portfolio || [];
      const profileImgUrl = artist.profile_url || `images/resident-artists/${artist.slug}-profile.webp`;

      const styles = (artist.styles || []).map(s =>
        `<span class="artist-style-tag">${s}</span>`
      ).join('');

      const instaHandle = artist.instagram || '';
      const instaUrl    = instaHandle ? `https://instagram.com/${instaHandle.replace('@', '')}` : '#';

      const availHtml = availability.length > 0
        ? `<div class="availability-dates">
            ${availability.filter(a => a.is_available).map(a =>
              `<a class="availability-date" href="bookings.html?artist=${encodeURIComponent(artist.slug)}&date=${a.date}" title="${a.notes || ''}">
                ${formatDate(a.date)}
              </a>`
            ).join('')}
           </div>`
        : `<p class="availability-empty">No dates currently available. Contact us directly to enquire.</p>`;

      const portfolioHtml = portfolio.length > 0
        ? portfolio.map(img =>
            `<div class="portfolio-item" data-full="${img.urlFull}">
               <img src="${img.url}" alt="${artist.name} — portfolio" loading="lazy">
               <div class="portfolio-item-icon">
                 <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                   <path d="M15 3h6m0 0v6m0-6-7 7M9 21H3m0 0v-6m0 6 7-7"/>
                 </svg>
               </div>
             </div>`
          ).join('')
        : `<p style="font-size:14px;font-weight:300;color:var(--sec-grey)">Portfolio coming soon.</p>`;

      root.innerHTML = `
        <div class="artist-hero reveal">
          <div class="artist-profile-card">
            <div class="artist-profile-img-wrap">
              <img
                class="artist-profile-img"
                src="${profileImgUrl || ''}"
                alt="${artist.name}"
                onerror="this.parentElement.style.background='var(--off-white)';this.style.display='none'"
              >
            </div>
            <div class="artist-profile-caption">
              <span class="artist-profile-caption-type">${artist.is_resident ? 'Resident Artist' : 'Guest Artist'}</span>
              <span class="artist-profile-caption-location">Ballsbridge · Dublin</span>
            </div>
          </div>

          <div class="artist-info">
            <h1 class="artist-name">${artist.name}</h1>
            <div class="artist-styles">${styles}</div>
            <p class="artist-bio">${artist.bio || ''}</p>
            <div class="artist-actions">
              ${instaHandle ? `
              <a class="artist-insta" href="${instaUrl}" target="_blank" rel="noopener" aria-label="${artist.name} Instagram">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="2" y="2" width="20" height="20" rx="5"/>
                  <circle cx="12" cy="12" r="4"/>
                  <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/>
                </svg>
                ${instaHandle}
              </a>` : ''}
              <a href="bookings.html?artist=${encodeURIComponent(artist.slug)}" class="btn btn-primary btn-sm">Book a Session</a>
            </div>
          </div>
        </div>

        <div class="artist-divider"><hr></div>

        <div class="artist-portfolio">
          <div class="artist-section-header">
            <span class="artist-section-label">Portfolio</span>
            <span class="artist-section-count"></span>
          </div>
          <div class="portfolio-grid">${portfolioHtml}</div>
        </div>

        <div class="artist-availability">
          <div class="artist-availability-inner">
            <div class="artist-section-header">
              <span class="artist-section-label">Available Dates</span>
            </div>
            ${availHtml}
          </div>
        </div>

        <div class="artist-cta">
          <span class="section-label">Ready?</span>
          <h2 class="section-title">Book with ${artist.name}</h2>
          <p class="section-body">Start the conversation — tell us what you have in mind.</p>
          <a href="bookings.html?artist=${encodeURIComponent(artist.slug)}" class="btn btn-primary">Book a Session</a>
        </div>
      `;

      // Reveal animation
      document.querySelectorAll('.reveal').forEach(el => {
        const obs = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
        }, { threshold: 0.1 });
        obs.observe(el);
      });

      // Lightbox
      const lightbox     = document.getElementById('lightbox');
      const lightboxImg  = document.getElementById('lightbox-img');
      const lightboxClose = document.getElementById('lightbox-close');

      document.querySelectorAll('.portfolio-item').forEach(item => {
        item.addEventListener('click', () => {
          lightboxImg.src = item.dataset.full;
          lightboxImg.alt = item.querySelector('img').alt;
          lightbox.classList.add('open');
          document.body.style.overflow = 'hidden';
        });
      });

      lightboxClose.addEventListener('click', closeLightbox);
      lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

      function closeLightbox() {
        lightbox.classList.remove('open');
        document.body.style.overflow = '';
        lightboxImg.src = '';
      }
    }

    function renderNotFound() {
      root.innerHTML = `
        <div class="artist-not-found">
          <h1>Artist Not Found</h1>
          <p>This artist doesn't exist or is no longer active.</p>
          <a href="/#artists" class="btn btn-primary" style="margin-top:16px">Back to Artists</a>
        </div>
      `;
    }

  })();
  </script>

</body>
</html>
